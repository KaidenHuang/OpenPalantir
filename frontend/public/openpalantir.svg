<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32">
  <defs>
    <!-- 折线形状（保持原路径不变） -->
    <path id="pleat" d="M26.865 24L16 28.24L5.135 24l-1.802 3.125L16 32l12.667-4.875z"/>
    <!-- 圆路径（保持原路径不变） -->
    <path id="orb" d="M16 0C9.005 0 3.333 5.672 3.333 12.667S9.005 25.334 16 25.334s12.667-5.672 12.667-12.667S22.995 0 16 0"/>
  </defs>

  <!-- 水晶球：居中，纯色扁平 -->
  <g transform="translate(16, 16) scale(0.75) translate(-16, -12.667)">
    <use href="#orb" fill="#4f46e5"/>
  </g>

  <!-- 5个折线：和谐五色，依次旋转72° -->
  <g transform="rotate(0, 16, 16) translate(16, 26.2) scale(0.5) translate(-16, -24)">
    <use href="#pleat" fill="#818cf8"/>
  </g>
  <g transform="rotate(72, 16, 16) translate(16, 26.2) scale(0.5) translate(-16, -24)">
    <use href="#pleat" fill="#22d3ee"/>
  </g>
  <g transform="rotate(144, 16, 16) translate(16, 26.2) scale(0.5) translate(-16, -24)">
    <use href="#pleat" fill="#a78bfa"/>
  </g>
  <g transform="rotate(216, 16, 16) translate(16, 26.2) scale(0.5) translate(-16, -24)">
    <use href="#pleat" fill="#34d399"/>
  </g>
  <g transform="rotate(288, 16, 16) translate(16, 26.2) scale(0.5) translate(-16, -24)">
    <use href="#pleat" fill="#fbbf24"/>
  </g>
</svg>
